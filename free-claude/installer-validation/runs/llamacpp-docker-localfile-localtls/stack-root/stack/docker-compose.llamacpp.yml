services:
  llamacpp:
    image: ghcr.io/ggerganov/llama.cpp:server
    command:
      - -m
      - /models/dummy-model.gguf
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - -c
      - "4096"
      - -ngl
      - "0"
    ports:
      - "8090:8080"
    volumes:
      - "./models:/models"
    restart: unless-stopped
