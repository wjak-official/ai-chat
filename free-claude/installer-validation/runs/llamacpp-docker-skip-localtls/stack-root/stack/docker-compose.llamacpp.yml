services:
  llamacpp:
    image: ghcr.io/ggerganov/llama.cpp:server
    command:
      - -m
      - /models/CHANGE_ME.gguf
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - -c
      - "16384"
      - -ngl
      - "8"
    ports:
      - "8092:8080"
    volumes:
      - "./models:/models"
    restart: unless-stopped
