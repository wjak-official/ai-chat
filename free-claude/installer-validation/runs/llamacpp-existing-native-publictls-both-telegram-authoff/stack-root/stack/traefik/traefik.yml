log:
  level: INFO
api:
  dashboard: true
entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"
providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true
certificatesResolvers:
  le:
    acme:
      email: "admin-llama-existing@example.test"
      storage: /acme/acme.json
      httpChallenge:
        entryPoint: web
